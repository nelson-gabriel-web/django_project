{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<div class="container" style="max-width: 400px; margin: 0 auto;">
    <h2 style="color: #fff; text-align: center; margin-bottom: 30px;">🔑 Recuperar Password</h2>
    
    <form method="post" style="background: rgba(255,255,255,0.05); padding: 30px; border-radius: 12px;">
        {% csrf_token %}
        
        <div class="form-group">
            <label style="color: #fff;">Email</label>
            <input type="email" name="email" class="form-control" placeholder="Seu email" required>
        </div>
        
        <button type="submit" class="btn-metal" style="width: 100%; margin-top: 10px;">
            <i class="fas fa-paper-plane"></i> Enviar Link
        </button>
    </form>
    
    <p style="text-align: center; color: rgba(255,255,255,0.5); margin-top: 15px;">
        <a href="{% url 'login' %}" style="color: #c0c0c0;">Voltar ao Login</a>
    </p>
</div>
{% endblock %}
