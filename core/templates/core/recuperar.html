{% extends 'core/base.html' %}

{% block content %}
<h2>🔑 Recuperar Password</h2>

<p>Digite o seu email para receber instruções de recuperação.</p>

{% if messages %}
    {% for message in messages %}
        <div style="padding: 10px; border-radius: 5px; margin-bottom: 15px; 
            {% if message.tags == 'success' %}background: #d4edda; color: #155724; border: 1px solid #c3e6cb;
            {% else %}background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;{% endif %}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<form method="post" style="max-width: 400px;">
    {% csrf_token %}
    
    <div style="margin-bottom: 15px;">
        <label style="display: block; font-weight: bold;">Email:</label>
        <input type="email" name="email" placeholder="Digite seu email" required
               style="width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 5px; font-size: 16px;">
    </div>
    
    <button type="submit" style="background: #008CBA; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px;">
        📩 Enviar Instruções
    </button>
</form>

<p style="margin-top: 20px;">
    <a href="{% url 'login' %}">↩️ Voltar ao Login</a>
</p>
{% endblock %}
