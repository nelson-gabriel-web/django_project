{% extends 'core/base_login.html' %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto; text-align: center;">
    <div style="font-size: 48px; margin-bottom: 8px;">🔑</div>
    <h2 style="font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 4px;">Recuperar Password</h2>
    <p style="color: rgba(255,255,255,0.6); margin-bottom: 32px;">Digite o seu email para receber instruções.</p>

    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label style="color: rgba(255,255,255,0.8);">Email</label>
            <input type="email" name="email" class="form-control" placeholder="Digite seu email" required>
        </div>
        
        <button type="submit" style="background: #1a73e8; color: #fff; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; transition: background 0.3s;">
            📩 Enviar Instruções
        </button>
    </form>

    <p style="margin-top: 20px; color: rgba(255,255,255,0.5);">
        <a href="{% url 'login' %}" style="color: #4fc3f7; text-decoration: none;">↩️ Voltar ao Login</a>
    </p>
</div>
{% endblock %}
