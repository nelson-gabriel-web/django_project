{% extends 'core/base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto;">
    <h2 style="font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px;">🔐 Login</h2>
    <p style="color: #888; margin-bottom: 20px; font-size: 14px;">Aceda à sua agenda.</p>

    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Utilizador ou Email</label>
            <input type="text" name="username" class="form-control" placeholder="Digite seu username ou email" required>
        </div>
        
        <div class="form-group">
            <label>Palavra-passe</label>
            <div class="password-wrapper">
                <input type="password" id="passwordLogin" name="password" class="form-control" placeholder="Digite sua palavra-passe" required>
                <i id="eyeLogin" onclick="togglePassword('passwordLogin', 'eyeLogin')" class="fas fa-eye-slash password-toggle"></i>
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block">🔓 Entrar</button>
    </form>

    <p style="text-align: center; margin-top: 16px; font-size: 14px;">
        <a href="{% url 'recuperar' %}" style="color: #1a73e8;">🔑 Esqueceu a password?</a>
    </p>
    <p style="text-align: center; margin-top: 8px; font-size: 14px; color: #888;">
        Não tem conta? <a href="{% url 'registar' %}" style="color: #1a73e8;">Registe-se</a>
    </p>
</div>
{% endblock %}
