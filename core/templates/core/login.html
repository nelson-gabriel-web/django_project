{% extends 'core/base.html' %}

{% block content %}
<h2 style="color: #fff; font-weight: 300; margin-bottom: 24px;">🔐 Login</h2>

<form method="post">
    {% csrf_token %}
    
    <div class="form-group">
        <label>Utilizador ou Email</label>
        <input type="text" name="username" class="form-control" placeholder="Digite seu username ou email" required>
    </div>
    
    <div class="form-group">
        <label>Palavra-passe</label>
        <div class="password-wrapper">
            <input type="password" id="passwordLogin" name="password" class="form-control" placeholder="Digite sua palavra-passe" required>
            <i id="eyeLogin" onclick="togglePassword('passwordLogin', 'eyeLogin')" 
               class="fas fa-eye-slash password-toggle" 
               style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 20px; color: rgba(255,255,255,0.4);">
            </i>
        </div>
    </div>
    
    <button type="submit" class="btn btn-primary btn-block">🔓 Entrar</button>
</form>

<p style="margin-top: 20px; text-align: center; color: rgba(255,255,255,0.6);">
    <a href="{% url 'recuperar' %}" style="color: #4fc3f7;">🔑 Esqueceu a password?</a>
</p>

<p style="margin-top: 12px; text-align: center; color: rgba(255,255,255,0.5);">
    Não tem conta? <a href="{% url 'registar' %}">Registe-se aqui</a>
</p>
{% endblock %}
