{% extends 'core/base_login.html' %}

{% block content %}
<div style="max-width: 400px; margin: 40px auto; text-align: center;">
    <div style="font-size: 48px; margin-bottom: 8px;">🔒</div>
    <h2 style="font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 4px;">Login</h2>
    <p style="color: rgba(255,255,255,0.6); margin-bottom: 32px;">Aceda à sua conta.</p>

    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label style="color: rgba(255,255,255,0.8);">Utilizador ou Email</label>
            <input type="text" name="username" class="form-control" placeholder="Digite seu username ou email" required
                   style="width: 100%; padding: 12px 16px; border: 2px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(255,255,255,0.08); color: #fff; font-size: 16px;">
        </div>
        
        <div class="form-group">
            <label style="color: rgba(255,255,255,0.8);">Palavra-passe</label>
            <div class="password-wrapper">
                <input type="password" id="passwordLogin" name="password" class="form-control" placeholder="Digite sua palavra-passe" required
                       style="width: 100%; padding: 12px 16px; padding-right: 44px; border: 2px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(255,255,255,0.08); color: #fff; font-size: 16px;">
                <i id="eyeLogin" onclick="togglePassword('passwordLogin', 'eyeLogin')" 
                   class="fas fa-eye-slash password-toggle" 
                   style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 18px; color: rgba(255,255,255,0.4);">
                </i>
            </div>
        </div>
        
        <button type="submit" style="background: #1a73e8; color: #fff; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; transition: background 0.3s;">
            🔓 Entrar
        </button>
    </form>

    <p style="margin-top: 20px; color: rgba(255,255,255,0.5);">
        <a href="{% url 'recuperar' %}" style="color: #4fc3f7; text-decoration: none;">🔑 Esqueceu a password?</a>
    </p>
    <p style="margin-top: 8px; color: rgba(255,255,255,0.5);">
        Não tem conta? <a href="{% url 'registar' %}" style="color: #4fc3f7; text-decoration: none;">Registe-se</a>
    </p>
</div>
{% endblock %}
