{% extends 'core/base.html' %}

{% block content %}
<section style="max-width: 420px; margin: 40px auto;">
    <h2 style="font-size: 28px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px;">🔐 Entrar</h2>
    <p style="color: #888; margin-bottom: 32px;">Acesse a sua agenda de contactos.</p>

    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Utilizador ou Email</label>
            <input type="text" name="username" class="form-control" placeholder="Digite seu username ou email" required>
        </div>
        
        <div class="form-group">
            <label>Palavra-passe</label>
            <div class="password-wrapper">
                <input type="password" id="passwordLogin" name="password" class="form-control" placeholder="Digite sua palavra-passe" required>
                <i id="eyeLogin" onclick="togglePassword('passwordLogin', 'eyeLogin')" 
                   class="fas fa-eye-slash password-toggle"></i>
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">🔓 Entrar</button>
    </form>

    <p style="text-align: center; margin-top: 20px; color: #888; font-size: 14px;">
        <a href="{% url 'recuperar' %}" style="color: #6C63FF; text-decoration: none;">🔑 Esqueceu a password?</a>
    </p>
    <p style="text-align: center; margin-top: 8px; color: #888; font-size: 14px;">
        Não tem conta? <a href="{% url 'registar' %}" style="color: #6C63FF; text-decoration: none;">Registe-se aqui</a>
    </p>
</section>
{% endblock %}
