{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<div class="container" style="max-width: 600px; margin: 0 auto;">
    <h2 style="color: #fff; text-align: center; margin-bottom: 20px;">🚫 Denunciar Fornecedor</h2>
    
    <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; margin-bottom: 20px;">
        <p style="color: rgba(255,255,255,0.6);">
            <i class="fas fa-info-circle"></i> 
            Está a denunciar: <strong style="color: #fff;">{{ fornecedor.username }}</strong>
        </p>
    </div>
    
    <form method="post" style="background: rgba(255,255,255,0.05); padding: 30px; border-radius: 12px;">
        {% csrf_token %}
        
        <div class="form-group">
            <label style="color: #fff;">Categoria da Denúncia</label>
            <select name="categoria" class="form-control" required>
                <option value="">Selecione uma categoria</option>
                {% for key, value in categorias %}
                    <option value="{{ key }}">{{ value }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label style="color: #fff;">Descrição Detalhada</label>
            <textarea name="descricao" class="form-control" rows="5" placeholder="Descreva detalhadamente o motivo da denúncia..." required></textarea>
        </div>
        
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button type="submit" class="btn-metal" style="flex: 1; background: #e74c3c; box-shadow: none;">
                <i class="fas fa-flag"></i> Enviar Denúncia
            </button>
            <a href="{% url 'home' %}" class="btn-metal" style="background: #444; box-shadow: none; flex: 0.3; text-align: center;">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
