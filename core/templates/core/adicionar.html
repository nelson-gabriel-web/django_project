{% extends 'core/base.html' %}

{% block content %}
<button type="submit" class="btn-add" style="background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">
    💾 Salvar
</button>
<h2>➕ Adicionar Contacto</h2>

<form method="post" style="max-width: 500px;">
    {% csrf_token %}
    
    <div style="margin-bottom: 15px;">
        <label style="display: block; font-weight: bold;">Nome:</label>
        {{ form.nome }}
    </div>
    
    <div style="margin-bottom: 15px;">
        <label style="display: block; font-weight: bold;">Telefone:</label>
        {{ form.telefone }}
    </div>
    
    <div style="margin-bottom: 15px;">
        <label style="display: block; font-weight: bold;">Endereço:</label>
        {{ form.endereco }}
    </div>
    
    <div class="tooltip-container" style="display: inline-block; margin-right: 10px;">
        <button type="submit" style="background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">💾 Salvar</button>
        <span class="tooltip-text">Guardar este contacto no sistema</span>
    </div>
    
    <div class="tooltip-container" style="display: inline-block;">
        <a href="{% url 'home' %}" style="background: #555; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block;">↩️ Voltar</a>
        <span class="tooltip-text">Cancelar e voltar ao início</span>
    </div>
</form>
{% endblock %}
