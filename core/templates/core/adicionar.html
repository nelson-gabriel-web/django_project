{% extends 'core/base.html' %}

{% block content %}
<section style="max-width: 560px; margin: 40px auto;">
    <h2 style="font-size: 24px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px;">➕ Adicionar Contacto</h2>
    <p style="color: #888; margin-bottom: 32px;">Preencha os dados do novo contacto.</p>

    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Nome</label>
            <input type="text" name="nome" class="form-control" placeholder="Digite o nome" required>
        </div>
        
        <div class="form-group">
            <label>Telefone</label>
            <input type="text" name="telefone" class="form-control" placeholder="Digite o telefone" required>
        </div>
        
        <div class="form-group">
            <label>Endereço</label>
            <textarea name="endereco" class="form-control" placeholder="Digite o endereço" rows="3"></textarea>
        </div>
        
        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
            <button type="submit" class="btn btn-success">💾 Salvar</button>
            <a href="{% url 'home' %}" class="btn btn-secondary">↩️ Voltar</a>
        </div>
    </form>
</section>
{% endblock %}
