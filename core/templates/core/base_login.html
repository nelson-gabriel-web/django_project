{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Nhonga — Login</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
                   background: #000000;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-control:focus {
            border-color: #1a73e8;
        }
        .form-control::placeholder {
            color: rgba(255,255,255,0.3);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: rgba(255,255,255,0.8);
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
        }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper .form-control {
            padding-right: 44px;
        }
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            color: rgba(255,255,255,0.4);
            transition: color 0.3s;
        }
        .password-toggle:hover {
            color: #4fc3f7;
        }
        a { color: #4fc3f7; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .mensagem {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .mensagem-success {
            background: rgba(46, 125, 50, 0.2);
            color: #a5d6a7;
            border: 1px solid rgba(46, 125, 50, 0.3);
        }
        .mensagem-error {
            background: rgba(198, 40, 40, 0.2);
            color: #ef9a9a;
            border: 1px solid rgba(198, 40, 40, 0.3);
        }
        .mensagem-info {
            background: rgba(0, 140, 186, 0.2);
            color: #80deea;
            border: 1px solid rgba(0, 140, 186, 0.3);
        }
        @media (max-width: 480px) {
            .container { padding: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="mensagem mensagem-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        {% block content %}{% endblock %}
    </div>

    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye password-toggle';
                icon.style.color = '#4fc3f7';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye-slash password-toggle';
                icon.style.color = 'rgba(255,255,255,0.4)';
            }
        }
    </script>
</body>
</html>
