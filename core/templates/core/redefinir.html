{% extends 'core/base.html' %}

{% block content %}
<h2>🔐 Redefinir Password</h2>

<p>Olá, <strong>{{ user.username }}</strong>! Digite a sua nova password.</p>

{% if messages %}
    {% for message in messages %}
        <div style="padding: 10px; border-radius: 5px; margin-bottom: 15px; 
            {% if message.tags == 'success' %}background: #d4edda; color: #155724; border: 1px solid #c3e6cb;
            {% else %}background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;{% endif %}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<form method="post" style="max-width: 400px;">
    {% csrf_token %}
    
    <div style="margin-bottom: 15px;">
    <label style="display: block; font-weight: bold;">Nova Password:</label>
    <div style="position: relative;">
        <input type="password" id="passwordRedefinir1" name="nova_password" placeholder="Digite a nova password (mínimo 8 caracteres)" required
               style="width: 100%; padding: 10px; padding-right: 40px; border: 2px solid #ddd; border-radius: 5px; font-size: 16px;">
        <i id="eyeRedefinir1" onclick="togglePassword('passwordRedefinir1', 'eyeRedefinir1')" 
           class="fas fa-eye-slash" 
           style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 20px; color: #888;">
        </i>
    </div>
</div>

<div style="margin-bottom: 15px;">
    <label style="display: block; font-weight: bold;">Confirmar Password:</label>
    <div style="position: relative;">
        <input type="password" id="passwordRedefinir2" name="confirmar_password" placeholder="Confirme a nova password" required
               style="width: 100%; padding: 10px; padding-right: 40px; border: 2px solid #ddd; border-radius: 5px; font-size: 16px;">
        <i id="eyeRedefinir2" onclick="togglePassword('passwordRedefinir2', 'eyeRedefinir2')" 
           class="fas fa-eye-slash" 
           style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 20px; color: #888;">
        </i>
    </div>
</div>
    
    <div style="margin-bottom: 15px;">
        <label style="display: block; font-weight: bold;">Confirmar Password:</label>
        <div style="position: relative;">
            <input type="password" id="passwordRedefinir2" name="confirmar_password" placeholder="Confirme a nova password" required
                   style="width: 100%; padding: 10px; padding-right: 40px; border: 2px solid #ddd; border-radius: 5px; font-size: 16px;">
            <span id="eyeRedefinir2" onclick="togglePassword('passwordRedefinir2', 'eyeRedefinir2')" 
                  style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 20px; color: #888;">
                <i class="fas fa-eye-slash"></i>
            </span>
        </div>
    </div>
    
    <button type="submit" style="background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px;">
        ✅ Redefinir Password
    </button>
</form>

<p style="margin-top: 20px; text-align: center;">
    <a href="{% url 'login' %}">↩️ Voltar ao Login</a>
</p>
{% endblock %}
