{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>LabSec - Agenda de Contactos</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
</head>
<body>
    <div class="container">
        <!-- Áudio para sons -->
        <audio id="somSucesso" preload="auto">
            <source src="{% static 'core/sounds/sucesso.mp3' %}" type="audio/mpeg">
        </audio>
        <audio id="somErro" preload="auto">
            <source src="{% static 'core/sounds/erro.mp3' %}" type="audio/mpeg">
        </audio>
        
        <div class="header">
            <span class="logo">📒</span>
            <h1>Agenda de Contactos</h1>
        </div>
        
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message message-{{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        
        {% block content %}
        {% endblock %}
    </div>

    <script>
        // Função para alternar visibilidade da password
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye password-toggle';
                icon.style.color = '#4fc3f7';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye-slash password-toggle';
                icon.style.color = 'rgba(255,255,255,0.4)';
            }
        }

        // Sons
        function tocarSucesso() {
            try {
                const som = document.getElementById('somSucesso');
                if (som) {
                    som.currentTime = 0;
                    som.play().catch(function(e) {});
                }
            } catch(e) {}
        }

        function tocarErro() {
            try {
                const som = document.getElementById('somErro');
                if (som) {
                    som.currentTime = 0;
                    som.play().catch(function(e) {});
                }
            } catch(e) {}
        }

        document.addEventListener('DOMContentLoaded', function() {
            // Sons para botões de sucesso
            document.querySelectorAll('.btn-success, .btn-primary, a[href*="adicionar"], a[href*="editar"], button[type="submit"]:not(.btn-danger)').forEach(function(el) {
                el.addEventListener('click', function(e) {
                    if (!this.href || !this.href.includes('excluir')) {
                        setTimeout(tocarSucesso, 200);
                    }
                });
            });

            // Sons para botões de erro
            document.querySelectorAll('.btn-danger, a[href*="excluir"], a[href*="logout"]').forEach(function(el) {
                el.addEventListener('click', function(e) {
                    setTimeout(tocarErro, 200);
                });
            });

            // Cadeado
            const lockContainer = document.querySelector('.lock-container');
            if (lockContainer) {
                lockContainer.addEventListener('click', function() {
                    setTimeout(tocarSucesso, 300);
                });
            }

            // Mensagens automáticas
            if (document.querySelector('.message-error')) {
                setTimeout(tocarErro, 500);
            }
            if (document.querySelector('.message-success')) {
                setTimeout(tocarSucesso, 500);
            }
        });
    </script>
</body>
</html>
