{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Agenda de Contactos</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        .tooltip-container {
            position: relative;
            display: inline-block;
        }
        .tooltip-container .tooltip-text {
            visibility: hidden;
            width: 200px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 8px 12px;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 14px;
            white-space: nowrap;
        }
        .tooltip-container .tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
        .tooltip-container:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }
        .mensagem {
            padding: 10px 15px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .mensagem-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .mensagem-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .mensagem-info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
</head>
<body>
    <div style="max-width: 900px; margin: 0 auto; padding: 20px; font-family: Arial, sans-serif;">
        <!-- Áudio para sons -->
        <audio id="somSucesso" preload="auto">
            <source src="{% static 'core/sounds/sucesso.mp3' %}" type="audio/mpeg">
        </audio>
        <audio id="somErro" preload="auto">
            <source src="{% static 'core/sounds/erro.mp3' %}" type="audio/mpeg">
        </audio>
        
        <h1 style="color: #333;">📒 Agenda de Contactos</h1>
        <hr>
        
        {% if messages %}
            {% for message in messages %}
                <div class="mensagem mensagem-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        {% block content %}
        {% endblock %}
    </div>

    <script>
        function tocarSucesso() {
            try {
                const som = document.getElementById('somSucesso');
                if (som) {
                    som.currentTime = 0;
                    som.play().catch(function(e) {
                        console.log('Erro ao tocar som de sucesso:', e);
                    });
                }
            } catch(e) {
                console.log('Erro:', e);
            }
        }

        function tocarErro() {
            try {
                const som = document.getElementById('somErro');
                if (som) {
                    som.currentTime = 0;
                    som.play().catch(function(e) {
                        console.log('Erro ao tocar som de erro:', e);
                    });
                }
            } catch(e) {
                console.log('Erro:', e);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('button[type="submit"], .btn-add, a[href*="adicionar"], a[href*="editar"]').forEach(function(el) {
                if (el.tagName === 'A' || el.tagName === 'BUTTON') {
                    el.addEventListener('click', function(e) {
                        if (!this.href || !this.href.includes('excluir')) {
                            setTimeout(tocarSucesso, 200);
                        }
                    });
                }
            });

            document.querySelectorAll('a[href*="excluir"], .btn-danger, .btn-cancel, a[href*="logout"]').forEach(function(el) {
                el.addEventListener('click', function(e) {
                    setTimeout(tocarErro, 200);
                });
            });

            const lockContainer = document.querySelector('.lock-container');
            if (lockContainer) {
                lockContainer.addEventListener('click', function() {
                    setTimeout(tocarSucesso, 300);
                });
            }

            const mensagensErro = document.querySelectorAll('.mensagem-error, .mensagem-danger');
            if (mensagensErro.length > 0) {
                setTimeout(tocarErro, 500);
            }

            const mensagensSucesso = document.querySelectorAll('.mensagem-success, .mensagem-info');
            if (mensagensSucesso.length > 0) {
                setTimeout(tocarSucesso, 500);
            }
        });

        document.querySelectorAll('form').forEach(function(form) {
            form.addEventListener('submit', function(e) {
                if (this.action && this.action.includes('excluir')) {
                    setTimeout(tocarErro, 300);
                } else {
                    setTimeout(tocarSucesso, 300);
                }
            });
        });
    </script>
</body>
</html>
