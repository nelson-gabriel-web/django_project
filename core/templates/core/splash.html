{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhonga</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            width: 100%;
        }
        body {
            background: #0a0e1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .splash-container {
            text-align: center;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
        }
        .logo-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        .logo-img {
            width: 500px;
            max-width: 90vw;
            height: auto;
            display: block;
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.3));
            animation: glowPulse 3s ease-in-out infinite;
            margin: 0 auto;
        }
        @keyframes glowPulse {
            0%, 100% {
                filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.2));
            }
            50% {
                filter: drop-shadow(0 0 60px rgba(255, 255, 255, 0.6));
            }
        }
        @media (max-width: 768px) {
            .splash-container {
                padding: 10px;
                height: 100vh;
                justify-content: center;
            }
            .logo-img {
                width: 320px;
                max-width: 85vw;
            }
        }
        @media (max-width: 480px) {
            .logo-img {
                width: 250px;
                max-width: 80vw;
            }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="logo-wrapper">
            <img src="{% static 'core/images/logo.png' %}" alt="Nhonga" class="logo-img" id="logo">
        </div>
    </div>

    <script>
        setTimeout(function() {
            window.location.href = "/login/";
        }, 4000);
    </script>
</body>
</html>
