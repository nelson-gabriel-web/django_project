{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>LabSec</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 50%, #0a1628 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        .splash-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
            padding: 20px;
        }
        
        /* ========== CADEADO ========== */
        .lock-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .lock-container:hover {
            transform: scale(1.05);
        }
        
        .lock-svg {
            width: 120px;
            height: 120px;
            filter: drop-shadow(0 0 30px rgba(0, 150, 255, 0.3));
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .lock-svg:hover {
            transform: scale(1.1) rotate(5deg);
        }
        
        .lock-body {
            fill: #1a73e8;
            transition: fill 0.3s;
        }
        
        .lock-body:hover {
            fill: #1557b0;
        }
        
        /* ========== INSTRUÇÃO (em baixo do cadeado) ========== */
        .instrucao {
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            animation: pulse 2s infinite;
            letter-spacing: 1px;
            transition: opacity 0.3s ease;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.9; }
        }
        
        .instrucao.hidden {
            opacity: 0 !important;
        }
        
        /* ========== LABSEC + SLOGAN (centro absoluto) ========== */
        .center-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        
        .labsec-text {
            font-size: 52px;
            font-weight: 900;
            color: #4fc3f7;
            text-shadow: 0 0 30px rgba(79, 195, 247, 0.5);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            letter-spacing: 6px;
        }
        
        .labsec-text.show {
            opacity: 1;
            transform: scale(1);
        }
        
        .slogan {
            margin-top: 12px;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 2px;
            font-weight: 300;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 1s ease 0.5s;
            text-align: center;
        }
        
        .slogan.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* ========== LOADING DOTS (4 dots) ========== */
        .loading-dots {
            margin-top: 24px;
            display: none;
            gap: 10px;
        }
        
        .loading-dots.show {
            display: flex;
        }
        
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4fc3f7;
            animation: dotPulse 1.2s infinite;
        }
        
        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        .dot:nth-child(4) { animation-delay: 0.6s; }
        
        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
        
        /* ========== RESPONSIVO ========== */
        @media (max-width: 600px) {
            .lock-svg {
                width: 80px;
                height: 80px;
            }
            .labsec-text {
                font-size: 32px;
                letter-spacing: 4px;
            }
            .slogan {
                font-size: 14px;
                margin-top: 8px;
            }
            .instrucao {
                font-size: 12px;
            }
            .dot {
                width: 10px;
                height: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="splash-container" id="splashContainer">
        <!-- FASE 1: Cadeado + Instrução (visíveis inicialmente) -->
        <div class="lock-container" id="lockContainer">
            <!-- SVG do Cadeado -->
            <svg class="lock-svg" viewBox="0 0 100 100" id="lockSvg">
                <path d="M30 45 L30 30 C30 18 40 10 50 10 C60 10 70 18 70 30 L70 45"
                      stroke="#4fc3f7" stroke-width="6" fill="none" stroke-linecap="round"/>
                <rect class="lock-body" x="20" y="45" width="60" height="40" rx="8" ry="8" fill="#1a73e8"/>
                <circle cx="50" cy="65" r="10" fill="#fff" opacity="0.9"/>
                <rect x="48" y="65" width="4" height="8" rx="2" fill="#1a73e8"/>
            </svg>
            
            <!-- Instrução -->
            <div class="instrucao" id="instrucao">🔒 Clique no cadeado para continuar</div>
        </div>
        
        <!-- FASE 2: LabSec + Slogan + 4 Dots (centralizados) -->
        <div class="center-wrapper">
            <div class="labsec-text" id="labsecText">LabSec</div>
            <div class="slogan" id="slogan">Segurança digital começa com conhecimento local.</div>
            <div class="loading-dots" id="loadingDots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const lockContainer = document.getElementById('lockContainer');
            const lockSvg = document.getElementById('lockSvg');
            const labsecText = document.getElementById('labsecText');
            const slogan = document.getElementById('slogan');
            const loadingDots = document.getElementById('loadingDots');
            const instrucao = document.getElementById('instrucao');
            
            let animationStarted = false;
            
            function startAnimation() {
                if (animationStarted) return;
                animationStarted = true;
                
                // 1. Instrução desaparece IMEDIATAMENTE
                instrucao.classList.add('hidden');
                
                // 2. Cadeado encolhe e desaparece (0.8s)
                lockSvg.style.transition = 'transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.8s';
                lockSvg.style.transform = 'scale(0.1)';
                lockSvg.style.opacity = '0';
                
                // 3. LabSec aparece (após 0.3s)
                setTimeout(() => {
                    labsecText.classList.add('show');
                }, 300);
                
                // 4. Slogan aparece (após 0.8s)
                setTimeout(() => {
                    slogan.classList.add('show');
                }, 800);
                
                // 5. Mostrar loading dots (após 1.5s)
                setTimeout(() => {
                    loadingDots.classList.add('show');
                }, 1500);
                
                // 6. Redirecionar para o login APÓS 10 SEGUNDOS
                setTimeout(() => {
                    window.location.href = "{% url 'login' %}";
                }, 10000);
            }
            
            // Clique no cadeado
            lockContainer.addEventListener('click', function(e) {
                startAnimation();
            });
            
            // Efeito hover no cadeado
            lockSvg.addEventListener('mouseenter', function() {
                if (!animationStarted) {
                    this.style.transform = 'scale(1.1) rotate(5deg)';
                }
            });
            
            lockSvg.addEventListener('mouseleave', function() {
                if (!animationStarted) {
                    this.style.transform = 'scale(1) rotate(0deg)';
                }
            });
        });
    </script>
</body>
</html>
