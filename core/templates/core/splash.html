{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhonga</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        .splash-container {
            text-align: center;
            padding: 20px;
        }
        .logo {
            font-size: 72px;
            color: #c0c0c0;
            margin-bottom: 20px;
            animation: glowPulse 2s ease-in-out infinite;
        }
        .logo-text {
            font-size: 32px;
            color: #c0c0c0;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .loading {
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            margin-top: 30px;
            animation: blink 1s infinite;
        }
        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 20px rgba(192,192,192,0.3); }
            50% { text-shadow: 0 0 40px rgba(192,192,192,0.7); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="logo">🔒</div>
        <div class="logo-text">NHONGA</div>
        <div class="loading">Carregando...</div>
    </div>

    <script>
        // Redireciona para a página inicial após 3 segundos
        setTimeout(function() {
            window.location.href = "/home/";
        }, 3000);
    </script>
</body>
</html>
