{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhonga</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        .splash-container {
            text-align: center;
        }
        .logo {
            font-size: 48px;
            color: #c0c0c0;
            margin-bottom: 20px;
        }
        .loading {
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="logo">🔒 Nhonga</div>
        <div class="loading">Carregando...</div>
    </div>
    <script>
        setTimeout(function() {
            window.location.href = "{% url 'home' %}";
        }, 2000);
    </script>
</body>
</html>
