{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhonga</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
        }
        body {
            background: #0a0e1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        .splash-container {
            text-align: center;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .logo-img {
            width: 400px;
            max-width: 90vw;
            height: auto;
            display: block;
            margin: 0 auto;
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.3));
            animation: glowPulse 3s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%, 100% {
                filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.2));
            }
            50% {
                filter: drop-shadow(0 0 60px rgba(255, 255, 255, 0.6));
            }
        }
        @media (max-width: 600px) {
            .logo-img { 
                width: 280px;
                max-width: 85vw;
            }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <img src="{% static 'core/images/logo.png' %}" alt="Nhonga" class="logo-img" id="logo">
    </div>

    <script>
        // Aguarda 4 segundos e redireciona para o login
        setTimeout(function() {
            window.location.href = "/login/";
        }, 4000);
    </script>
</body>
</html>
