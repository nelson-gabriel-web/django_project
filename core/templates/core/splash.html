{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>LabSec</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 50%, #0a1628 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        .splash-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
            padding: 20px;
        }
        
        /* ========== CADEADO ========== */
        .lock-container {
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s;
        }
        
        .lock-container:hover {
            transform: scale(1.05);
        }
        
        .lock-svg {
            width: 120px;
            height: 120px;
            filter: drop-shadow(0 0 30px rgba(0, 150, 255, 0.3));
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .lock-svg:hover {
            transform: scale(1.1) rotate(5deg);
        }
        
        .lock-body {
            fill: #1a73e8;
            transition: fill 0.3s;
        }
        
        .lock-body:hover {
            fill: #1557b0;
        }
        
        /* ========== INSTRUÇÃO ========== */
        .instrucao {
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            animation: pulse 2s infinite;
            letter-spacing: 1px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.9; }
        }
        
        /* ========== LABSEC (que aparece atrás) ========== */
        .labsec-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 48px;
            font-weight: 900;
            color: #4fc3f7;
            text-shadow: 0 0 30px rgba(79, 195, 247, 0.5);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: 4px;
        }
        
        .labsec-text.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }
        
        /* ========== SLOGAN ========== */
        .slogan {
            margin-top: 30px;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 2px;
            font-weight: 300;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 1s ease 0.5s;
            text-align: center;
        }
        
        .slogan.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* ========== LOADING ========== */
        .loading-dots {
            margin-top: 30px;
            display: none;
            gap: 8px;
        }
        
        .loading-dots.show {
            display: flex;
        }
        
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4fc3f7;
            animation: dotPulse 1.2s infinite;
        }
        
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
        
        /* ========== RESPONSIVO ========== */
        @media (max-width: 600px) {
            .lock-svg {
                width: 80px;
                height: 80px;
            }
            .labsec-text {
                font-size: 28px;
            }
            .slogan {
                font-size: 13px;
            }
            .instrucao {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="splash-container" id="splashContainer">
        <div class="lock-container" id="lockContainer">
            <!-- SVG do Cadeado -->
            <svg class="lock-svg" viewBox="0 0 100 100" id="lockSvg">
                <path d="M30 45 L30 30 C30 18 40 10 50 10 C60 10 70 18 70 30 L70 45"
                      stroke="#4fc3f7" stroke-width="6" fill="none" stroke-linecap="round"/>
                <rect class="lock-body" x="20" y="45" width="60" height="40" rx="8" ry="8" fill="#1a73e8"/>
                <circle cx="50" cy="65" r="10" fill="#fff" opacity="0.9"/>
                <rect x="48" y="65" width="4" height="8" rx="2" fill="#1a73e8"/>
            </svg>
            
            <!-- LabSec (escondido atrás) -->
            <div class="labsec-text" id="labsecText">LabSec</div>
            
            <!-- Slogan -->
            <div class="slogan" id="slogan">Segurança digital começa com conhecimento local.</div>
            
            <!-- Loading dots -->
            <div class="loading-dots" id="loadingDots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            
            <!-- Instrução -->
            <div class="instrucao">🔒 Clique no cadeado para continuar</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const lockContainer = document.getElementById('lockContainer');
            const lockSvg = document.getElementById('lockSvg');
            const labsecText = document.getElementById('labsecText');
            const slogan = document.getElementById('slogan');
            const loadingDots = document.getElementById('loadingDots');
            const instrucao = document.querySelector('.instrucao');
            
            let animationStarted = false;
            
            function startAnimation() {
                if (animationStarted) return;
                animationStarted = true;
                
                // Esconder instrução
                instrucao.style.opacity = '0';
                instrucao.style.transition = 'opacity 0.5s';
                
                // 1. Mostrar LabSec atrás do cadeado
                labsecText.classList.add('show');
                
                // 2. Após 0.8 segundos, mostrar slogan
                setTimeout(() => {
    window.location.href = "{% url 'login' %}";
}, 4000);
                
                // 3. Após 1.5 segundos, cadeado encolhe e desaparece
                setTimeout(() => {
                    lockSvg.style.transition = 'transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.8s';
                    lockSvg.style.transform = 'scale(0.1)';
                    lockSvg.style.opacity = '0';
                    
                    labsecText.style.transition = 'all 0.8s ease';
                    labsecText.style.transform = 'translate(-50%, -50%) scale(1.5)';
                    labsecText.style.opacity = '0';
                    
                    slogan.style.transition = 'all 0.8s ease';
                    slogan.style.transform = 'translateY(50px)';
                    slogan.style.opacity = '0';
                    
                    // Mostrar loading dots
                    setTimeout(() => {
                        loadingDots.classList.add('show');
                    }, 400);
                    
                }, 1500);
                
                // 4. Redirecionar para o login após 4 segundos
                setTimeout(() => {
                    window.location.href = "{% url 'login' %}";
                }, 4000);
            }
            
            // Clique no cadeado
            lockContainer.addEventListener('click', function(e) {
                startAnimation();
            });
            
            // Efeito hover no cadeado
            lockSvg.addEventListener('mouseenter', function() {
                if (!animationStarted) {
                    this.style.transform = 'scale(1.1) rotate(5deg)';
                }
            });
            
            lockSvg.addEventListener('mouseleave', function() {
                if (!animationStarted) {
                    this.style.transform = 'scale(1) rotate(0deg)';
                }
            });
        });
    </script>
</body>
</html>
