{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>LabSec</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        .splash-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
            padding: 20px;
        }
        
        .lock-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .lock-container:hover {
            transform: scale(1.05);
        }
        
        .logo-img {
            width: 300px;
            height: 300px;
            object-fit: contain;
            cursor: pointer;
            transition: transform 0.3s;
            filter: drop-shadow(0 0 30px rgba(79, 195, 247, 0.3));
        }
        
        .logo-img:hover {
            transform: scale(1.1);
        }
        
        .instrucao {
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            animation: pulse 2s infinite;
            letter-spacing: 1px;
            transition: opacity 0.3s ease;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.9; }
        }
        
        .instrucao.hidden {
            opacity: 0 !important;
        }
        
        .labsec-text {
            margin-top: 20px;
            font-size: 48px;
            font-weight: 900;
            color: #4fc3f7;
            text-shadow: 0 0 30px rgba(79, 195, 247, 0.5);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            letter-spacing: 4px;
        }
        
        .labsec-text.show {
            opacity: 1;
            transform: scale(1);
        }
        
        .slogan {
            margin-top: 12px;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 2px;
            font-weight: 300;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 1s ease 0.5s;
            text-align: center;
        }
        
        .slogan.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .loading-dots {
            margin-top: 24px;
            display: none;
            gap: 10px;
        }
        
        .loading-dots.show {
            display: flex;
        }
        
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4fc3f7;
            animation: dotPulse 1.2s infinite;
        }
        
        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        .dot:nth-child(4) { animation-delay: 0.6s; }
        
        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
        
        @media (max-width: 600px) {
            .logo-img {
                width: 180px;
                height: 180px;
            }
            .labsec-text {
                font-size: 28px;
                letter-spacing: 4px;
            }
            .slogan {
                font-size: 14px;
                margin-top: 8px;
            }
            .instrucao {
                font-size: 12px;
            }
            .dot {
                width: 10px;
                height: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="splash-container" id="splashContainer">
        <div class="lock-container" id="lockContainer">
            <!-- Logotipo -->
            <img src="{% static 'core/images/logo.png' %}" 
                 alt="LabSec" 
                 class="logo-img"
                 id="logoImg">
            
            <div class="instrucao" id="instrucao">🔒 Clique no logotipo para continuar</div>
            
            <div class="labsec-text" id="labsecText">LabSec</div>
            <div class="slogan" id="slogan">Segurança digital começa com conhecimento local.</div>
            
            <div class="loading-dots" id="loadingDots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const lockContainer = document.getElementById('lockContainer');
            const logoImg = document.getElementById('logoImg');
            const labsecText = document.getElementById('labsecText');
            const slogan = document.getElementById('slogan');
            const loadingDots = document.getElementById('loadingDots');
            const instrucao = document.getElementById('instrucao');
            
            let animationStarted = false;
            
            function startAnimation() {
                if (animationStarted) return;
                animationStarted = true;
                
                instrucao.classList.add('hidden');
                
                logoImg.style.transition = 'transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.8s';
                logoImg.style.transform = 'scale(0.1)';
                logoImg.style.opacity = '0';
                
                setTimeout(() => {
                    labsecText.classList.add('show');
                }, 300);
                
                setTimeout(() => {
                    slogan.classList.add('show');
                }, 800);
                
                setTimeout(() => {
                    loadingDots.classList.add('show');
                }, 1500);
                
                setTimeout(() => {
                    window.location.href = "{% url 'login' %}";
                }, 8000);
            }
            
            lockContainer.addEventListener('click', function(e) {
                startAnimation();
            });
            
            logoImg.addEventListener('mouseenter', function() {
                if (!animationStarted) {
                    this.style.transform = 'scale(1.1)';
                }
            });
            
            logoImg.addEventListener('mouseleave', function() {
                if (!animationStarted) {
                    this.style.transform = 'scale(1)';
                }
            });
        });
    </script>
</body>
</html>
