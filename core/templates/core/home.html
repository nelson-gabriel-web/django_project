{% extends 'core/base.html' %}

{% block content %}
<h2>Bem-vindo à sua Agenda!</h2>
<p>Gerencie os seus contactos de forma simples e rápida.</p>

<div style="margin-top: 30px;">
    <div class="tooltip-container" style="display: inline-block; margin-right: 10px;">
        <a href="{% url 'adicionar' %}" style="background: #4CAF50; color: white; padding: 12px 24px; text-decoration: none; border-radius: 5px; display: inline-block;">
            ➕ Adicionar Contacto
        </a>
        <span class="tooltip-text">Clique para adicionar um novo contacto</span>
    </div>
    
    <div class="tooltip-container" style="display: inline-block;">
        <a href="{% url 'listar' %}" style="background: #008CBA; color: white; padding: 12px 24px; text-decoration: none; border-radius: 5px; display: inline-block;">
            📋 Ver Contactos
        </a>
        <span class="tooltip-text">Clique para ver todos os seus contactos</span>
    </div>
</div>
{% endblock %}
