{% extends 'core/base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto; text-align: center; padding: 40px 20px;">
    <div style="font-size: 60px; margin-bottom: 16px;">👋</div>
    <h2 style="font-size: 28px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px;">
        Olá, <strong>{{ user.username }}</strong>!
    </h2>
    <p style="color: #888; font-size: 16px; margin-bottom: 32px;">
        Bem-vindo ao LabSec. Gerencie os seus contactos e segurança num só lugar.
    </p>
    
    <div style="display: flex; flex-direction: column; gap: 12px; max-width: 300px; margin: 0 auto;">
        <a href="{% url 'adicionar' %}" style="background: #28a745; color: #fff; padding: 14px; border-radius: 8px; text-decoration: none; font-weight: 600; transition: background 0.3s;">
            ➕ Adicionar Contacto
        </a>
        <a href="{% url 'listar' %}" style="background: #1a73e8; color: #fff; padding: 14px; border-radius: 8px; text-decoration: none; font-weight: 600; transition: background 0.3s;">
            📋 Ver Contactos
        </a>
        <a href="{% url 'dashboard_seguranca' %}" style="background: #6c757d; color: #fff; padding: 14px; border-radius: 8px; text-decoration: none; font-weight: 600; transition: background 0.3s;">
            🔒 Dashboard Segurança
        </a>
        <a href="{% url 'logout' %}" style="background: #dc3545; color: #fff; padding: 14px; border-radius: 8px; text-decoration: none; font-weight: 600; transition: background 0.3s; margin-top: 8px;">
            🔓 Sair
        </a>
    </div>
</div>
{% endblock %}
