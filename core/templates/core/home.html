{% extends 'core/base.html' %}

{% block content %}
<div class="card" style="text-align: center;">
    <h2 style="color: #fff; font-weight: 300; margin-bottom: 8px;">
        👋 Olá, <strong>{{ user.username }}</strong>!
    </h2>
    <p style="color: rgba(255,255,255,0.6);">Gerencie os seus contactos de forma simples e rápida.</p>
    
    <div style="margin-top: 24px; display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;">
        <a href="{% url 'logout' %}" class="btn btn-danger">🔓 Sair</a>
    </div>
</div>

<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-top: 24px;">
    <a href="{% url 'adicionar' %}" class="card" style="text-decoration: none; color: #fff; text-align: center;">
        <div style="font-size: 32px; margin-bottom: 8px;">➕</div>
        <div style="font-weight: 600;">Adicionar Contacto</div>
        <div style="font-size: 14px; color: rgba(255,255,255,0.4);">Inserir novo contacto</div>
    </a>
    
    <a href="{% url 'listar' %}" class="card" style="text-decoration: none; color: #fff; text-align: center;">
        <div style="font-size: 32px; margin-bottom: 8px;">📋</div>
        <div style="font-weight: 600;">Ver Contactos</div>
        <div style="font-size: 14px; color: rgba(255,255,255,0.4);">Lista completa</div>
    </a>
    
    <a href="{% url 'buscar' %}" class="card" style="text-decoration: none; color: #fff; text-align: center;">
        <div style="font-size: 32px; margin-bottom: 8px;">🔍</div>
        <div style="font-weight: 600;">Buscar</div>
        <div style="font-size: 14px; color: rgba(255,255,255,0.4);">Pesquisar contactos</div>
    </a>
</div>
{% endblock %}
