{% extends 'core/base.html' %}

{% block content %}
<h2>✅ Contacto Salvo!</h2>
<p>O contacto foi adicionado com sucesso.</p>

<div style="margin-top: 20px;">
    <div class="tooltip-container" style="display: inline-block; margin-right: 10px;">
        <a href="{% url 'adicionar' %}" style="background: #4CAF50; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block;">
            ➕ Adicionar Outro
        </a>
        <span class="tooltip-text">Adicionar outro contacto</span>
    </div>
    
    <div class="tooltip-container" style="display: inline-block; margin-right: 10px;">
        <a href="{% url 'listar' %}" style="background: #008CBA; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block;">
            📋 Ver Lista
        </a>
        <span class="tooltip-text">Ver todos os contactos</span>
    </div>
    
    <div class="tooltip-container" style="display: inline-block;">
        <a href="{% url 'home' %}" style="background: #555; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block;">
            🏠 Início
        </a>
        <span class="tooltip-text">Voltar à página inicial</span>
    </div>
</div>
{% endblock %}
