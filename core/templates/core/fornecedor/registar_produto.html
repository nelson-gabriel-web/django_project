{% extends 'core/base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <h2 style="color: #fff; font-weight: 300; margin-bottom: 4px;">📦 Registar Produto/Serviço</h2>
    <p style="color: rgba(255,255,255,0.5); margin-bottom: 24px;">Adicione um novo produto ou serviço ao seu catálogo.</p>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="form-group">
            <label style="color: rgba(255,255,255,0.8);">Nome</label>
            {{ form.nome }}
        </div>
        
        <div class="form-group">
            <label style="color: rgba(255,255,255,0.8);">Descrição</label>
            {{ form.descricao }}
        </div>
        
        <div class="form-group">
            <label style="color: rgba(255,255,255,0.8);">Categoria</label>
            {{ form.categoria }}
        </div>
        
        <div class="form-group">
            <label style="color: rgba(255,255,255,0.8);">Preço (€)</label>
            {{ form.preco }}
        </div>
        
        <div class="form-group">
            <label style="color: rgba(255,255,255,0.8);">Imagem</label>
            {{ form.imagem }}
        </div>
        
        <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
            {{ form.registado }}
            <label style="color: rgba(255,255,255,0.8); cursor: pointer;">Produto registado/legal</label>
        </div>
        
        <button type="submit" class="btn-metal">✅ Registar Produto</button>
        <a href="{% url 'dashboard_fornecedor' %}" style="color: rgba(255,255,255,0.4); display: block; text-align: center; margin-top: 12px; text-decoration: none;">↩️ Voltar</a>
    </form>
</div>
{% endblock %}
