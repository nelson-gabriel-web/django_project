{% extends 'core/base.html' %}

{% block content %}
<h2>📝 Registo</h2>

{% if messages %}
    {% for message in messages %}
        <div style="padding: 10px; border-radius: 5px; margin-bottom: 15px; 
            {% if message.tags == 'success' %}background: #d4edda; color: #155724; border: 1px solid #c3e6cb;
            {% else %}background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;{% endif %}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<form method="post" style="max-width: 400px;">
    {% csrf_token %}
    
    <div style="margin-bottom: 15px;">
    <label style="display: block; font-weight: bold;">Palavra-passe:</label>
    <div style="position: relative;">
        <input type="password" id="passwordRegisto1" name="password1" placeholder="Digite sua palavra-passe" required
               style="width: 100%; padding: 10px; padding-right: 40px; border: 2px solid #ddd; border-radius: 5px; font-size: 16px;">
        <i id="eyeRegisto1" onclick="togglePassword('passwordRegisto1', 'eyeRegisto1')" 
           class="fas fa-eye-slash" 
           style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 20px; color: #888;">
        </i>
    </div>
</div>

<div style="margin-bottom: 15px;">
    <label style="display: block; font-weight: bold;">Confirmar Palavra-passe:</label>
    <div style="position: relative;">
        <input type="password" id="passwordRegisto2" name="password2" placeholder="Confirme sua palavra-passe" required
               style="width: 100%; padding: 10px; padding-right: 40px; border: 2px solid #ddd; border-radius: 5px; font-size: 16px;">
        <i id="eyeRegisto2" onclick="togglePassword('passwordRegisto2', 'eyeRegisto2')" 
           class="fas fa-eye-slash" 
           style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 20px; color: #888;">
        </i>
    </div>
</div>
    
    <button type="submit" style="background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px;">
        ✅ Registar
    </button>
</form>

<p style="margin-top: 20px; text-align: center;">
    Já tem conta? <a href="{% url 'login' %}">Entre aqui</a>
</p>
{% endblock %}
