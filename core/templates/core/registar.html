{% extends 'core/base.html' %}

{% block content %}
<section style="max-width: 420px; margin: 40px auto;">
    <h2 style="font-size: 28px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px;">📝 Criar conta</h2>
    <p style="color: #888; margin-bottom: 32px;">Registe-se para começar a usar a sua agenda.</p>

    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Utilizador</label>
            <input type="text" name="username" class="form-control" placeholder="Escolha um nome de utilizador" required>
        </div>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" class="form-control" placeholder="Digite seu email" required>
        </div>
        
        <div class="form-group">
            <label>Palavra-passe</label>
            <div class="password-wrapper">
                <input type="password" id="passwordRegisto1" name="password1" class="form-control" placeholder="Digite sua palavra-passe" required>
                <i id="eyeRegisto1" onclick="togglePassword('passwordRegisto1', 'eyeRegisto1')" 
                   class="fas fa-eye-slash password-toggle"></i>
            </div>
        </div>
        
        <div class="form-group">
            <label>Confirmar Palavra-passe</label>
            <div class="password-wrapper">
                <input type="password" id="passwordRegisto2" name="password2" class="form-control" placeholder="Confirme sua palavra-passe" required>
                <i id="eyeRegisto2" onclick="togglePassword('passwordRegisto2', 'eyeRegisto2')" 
                   class="fas fa-eye-slash password-toggle"></i>
            </div>
        </div>
        
        <button type="submit" class="btn btn-success" style="width: 100%;">✅ Registar</button>
    </form>

    <p style="text-align: center; margin-top: 20px; color: #888; font-size: 14px;">
        Já tem conta? <a href="{% url 'login' %}" style="color: #6C63FF; text-decoration: none;">Entre aqui</a>
    </p>
</section>
{% endblock %}
