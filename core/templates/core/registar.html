{% extends 'core/base.html' %}

{% block content %}
<h2>📝 Registo</h2>

<form method="post" style="max-width: 400px;">
    {% csrf_token %}
    
    <div style="margin-bottom: 15px;">
        <label style="display: block; font-weight: bold;">Utilizador:</label>
        {{ form.username }}
    </div>
    
    <div style="margin-bottom: 15px;">
        <label style="display: block; font-weight: bold;">Email:</label>
        {{ form.email }}
    </div>
    
    <div style="margin-bottom: 15px;">
        <label style="display: block; font-weight: bold;">Palavra-passe:</label>
        {{ form.password1 }}
    </div>
    
    <div style="margin-bottom: 15px;">
        <label style="display: block; font-weight: bold;">Confirmar Palavra-passe:</label>
        {{ form.password2 }}
    </div>
    
    <button type="submit" style="background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">
        ✅ Registar
    </button>
</form>

<p style="margin-top: 20px;">
    Já tem conta? <a href="{% url 'login' %}">Entre aqui</a>
</p>
{% endblock %}
