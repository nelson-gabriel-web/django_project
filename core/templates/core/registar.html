{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<div class="container" style="max-width: 500px; margin: 0 auto;">
    <h2 style="color: #fff; text-align: center; margin-bottom: 30px;">📝 Criar Conta</h2>
    
    <form method="post" style="background: rgba(255,255,255,0.05); padding: 30px; border-radius: 12px;">
        {% csrf_token %}
        
        <div class="form-group">
            <label style="color: #fff;">Nome de Utilizador</label>
            {{ form.username }}
        </div>
        
        <div class="form-group">
            <label style="color: #fff;">Password</label>
            {{ form.password1 }}
        </div>
        
        <div class="form-group">
            <label style="color: #fff;">Confirmar Password</label>
            {{ form.password2 }}
        </div>
        
        <button type="submit" class="btn-metal" style="width: 100%; margin-top: 10px;">
            <i class="fas fa-user-plus"></i> Criar Conta
        </button>
    </form>
    
    <p style="text-align: center; color: rgba(255,255,255,0.5); margin-top: 15px;">
        Já tem conta? <a href="{% url 'login' %}" style="color: #c0c0c0;">Faça login</a>
    </p>
</div>
{% endblock %}
